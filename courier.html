<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sajilo Sewa Courier</title>
    <meta
      name="description"
      content="Sajilo Sewa Courier keeps pickup, dropoff, package details, quotes, and courier status clean in one focused page."
    />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="courier-page-body">
    <div class="page-shell courier-page-shell">
      <header class="topbar courier-topbar">
        <div class="brand-lockup">
          <img class="brand-logo" src="./assets/logo-mark.svg" alt="Sajilo Sewa logo" />
          <div>
            <p class="eyebrow">Focused courier page</p>
            <h1>Sajilo Sewa Courier</h1>
          </div>
        </div>
        <nav class="topnav" aria-label="Primary">
          <a href="./index.html">Home</a>
          <a href="#courier-booking">Booking</a>
          <a href="#courier-status">Tracking</a>
        </nav>
      </header>

      <main class="courier-page-main">
        <section id="courier-page-hero" class="courier-page-hero"></section>

        <section id="courier-booking" class="section courier-page-section">
          <div class="section-heading">
            <p class="eyebrow">Booking</p>
            <h2>Simple courier information without extra noise</h2>
          </div>
          <div id="courier-booking-grid" class="courier-booking-grid"></div>
        </section>

        <section id="courier-status" class="section courier-page-section">
          <div class="section-heading">
            <p class="eyebrow">Status</p>
            <h2>Clear courier tracking and pricing details</h2>
          </div>
          <div id="courier-status-grid" class="courier-status-grid"></div>
        </section>
      </main>
    </div>
    <script src="./data/sajilo-seed-data.js"></script>
    <script type="module" src="./courier-page.js"></script>
  </body>
</html>
